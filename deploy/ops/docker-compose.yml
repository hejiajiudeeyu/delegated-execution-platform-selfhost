services:
  relay:
    image: ${IMAGE_REGISTRY:-ghcr.io/hejiajiudeeyu}/rsp-relay:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: Dockerfile.workspace
      args:
        APP_PATH: apps/transport-relay
    environment:
      PORT: ${RELAY_PORT:-8090}
      SERVICE_NAME: transport-relay
      RELAY_SQLITE_PATH: /data/relay.sqlite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${RELAY_PORT:-8090}:8090"
    volumes:
      - relay-data:/data

  caller-controller:
    image: ${IMAGE_REGISTRY:-ghcr.io/hejiajiudeeyu}/rsp-caller:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: Dockerfile.workspace
      args:
        APP_PATH: apps/caller-controller
    environment:
      PORT: ${CALLER_PORT:-8081}
      SERVICE_NAME: caller-controller
      PLATFORM_API_BASE_URL: ${PLATFORM_API_BASE_URL}
      PLATFORM_API_KEY: ${CALLER_PLATFORM_API_KEY:-}
      TRANSPORT_BASE_URL: http://relay:${RELAY_PORT:-8090}
      TRANSPORT_RECEIVER: ${CALLER_TRANSPORT_RECEIVER:-caller-controller}
      ACK_DEADLINE_S: ${ACK_DEADLINE_S:-120}
      TIMEOUT_CONFIRMATION_MODE: ${TIMEOUT_CONFIRMATION_MODE:-ask_by_default}
      HARD_TIMEOUT_AUTO_FINALIZE: ${HARD_TIMEOUT_AUTO_FINALIZE:-true}
      CALLER_CONTROLLER_POLL_INTERVAL_ACTIVE_S: ${CALLER_CONTROLLER_POLL_INTERVAL_ACTIVE_S:-5}
      CALLER_CONTROLLER_POLL_INTERVAL_BACKOFF_S: ${CALLER_CONTROLLER_POLL_INTERVAL_BACKOFF_S:-15}
      CALLER_CONTROLLER_INBOX_POLL_INTERVAL_MS: ${CALLER_CONTROLLER_INBOX_POLL_INTERVAL_MS:-250}
      CALLER_CONTROLLER_EVENTS_SYNC_INTERVAL_MS: ${CALLER_CONTROLLER_EVENTS_SYNC_INTERVAL_MS:-250}
      SQLITE_DATABASE_PATH: /data/caller-controller.sqlite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CALLER_PORT:-8081}:8081"
    volumes:
      - caller-data:/data
    depends_on:
      relay:
        condition: service_started

  responder-controller:
    profiles: ["responder"]
    image: ${IMAGE_REGISTRY:-ghcr.io/hejiajiudeeyu}/rsp-responder:${IMAGE_TAG:-latest}
    build:
      context: ../..
      dockerfile: Dockerfile.workspace
      args:
        APP_PATH: apps/responder-controller
    environment:
      PORT: ${RESPONDER_PORT:-8082}
      SERVICE_NAME: responder-controller
      PLATFORM_API_BASE_URL: ${PLATFORM_API_BASE_URL}
      PLATFORM_API_KEY: ""
      TRANSPORT_BASE_URL: http://relay:${RELAY_PORT:-8090}
      TRANSPORT_RECEIVER: ${RESPONDER_TRANSPORT_RECEIVER:-responder-local}
      RESPONDER_ID: ${RESPONDER_ID:-responder_local}
      HOTLINE_IDS: ${HOTLINE_IDS:-local.hotline.v1}
      RESPONDER_SIGNING_PUBLIC_KEY_PEM: ${RESPONDER_SIGNING_PUBLIC_KEY_PEM:-}
      RESPONDER_SIGNING_PRIVATE_KEY_PEM: ${RESPONDER_SIGNING_PRIVATE_KEY_PEM:-}
      RESPONDER_MAX_HARD_TIMEOUT_S: ${RESPONDER_MAX_HARD_TIMEOUT_S:-300}
      RESPONDER_ALLOWED_TASK_TYPES: ${RESPONDER_ALLOWED_TASK_TYPES:-}
      RESPONDER_HEARTBEAT_INTERVAL_MS: ${RESPONDER_HEARTBEAT_INTERVAL_MS:-30000}
      RESPONDER_INBOX_POLL_INTERVAL_MS: ${RESPONDER_INBOX_POLL_INTERVAL_MS:-250}
      SQLITE_DATABASE_PATH: /data/responder-controller.sqlite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${RESPONDER_PORT:-8082}:8082"
    volumes:
      - responder-data:/data
    depends_on:
      relay:
        condition: service_started

volumes:
  caller-data:
  responder-data:
  relay-data:
