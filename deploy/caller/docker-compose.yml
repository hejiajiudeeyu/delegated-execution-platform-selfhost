services:
  caller-controller:
    image: ${IMAGE_REGISTRY:-ghcr.io/hejiajiudeeyu}/rsp-caller:${IMAGE_TAG:-latest}
    environment:
      PORT: ${PORT:-8081}
      SERVICE_NAME: caller-controller
      PLATFORM_API_BASE_URL: ${PLATFORM_API_BASE_URL}
      PLATFORM_API_KEY: ${PLATFORM_API_KEY:-}
      TRANSPORT_BASE_URL: ${TRANSPORT_BASE_URL}
      TRANSPORT_RECEIVER: ${TRANSPORT_RECEIVER:-caller-controller}
      ACK_DEADLINE_S: ${ACK_DEADLINE_S:-120}
      TIMEOUT_CONFIRMATION_MODE: ${TIMEOUT_CONFIRMATION_MODE:-ask_by_default}
      HARD_TIMEOUT_AUTO_FINALIZE: ${HARD_TIMEOUT_AUTO_FINALIZE:-true}
      CALLER_CONTROLLER_POLL_INTERVAL_ACTIVE_S: ${CALLER_CONTROLLER_POLL_INTERVAL_ACTIVE_S:-5}
      CALLER_CONTROLLER_POLL_INTERVAL_BACKOFF_S: ${CALLER_CONTROLLER_POLL_INTERVAL_BACKOFF_S:-15}
      CALLER_CONTROLLER_INBOX_POLL_INTERVAL_MS: ${CALLER_CONTROLLER_INBOX_POLL_INTERVAL_MS:-250}
      CALLER_CONTROLLER_EVENTS_SYNC_INTERVAL_MS: ${CALLER_CONTROLLER_EVENTS_SYNC_INTERVAL_MS:-250}
      CALLER_CONTROLLER_EVENTS_SYNC_BATCH_SIZE: ${CALLER_CONTROLLER_EVENTS_SYNC_BATCH_SIZE:-25}
      DATABASE_URL: ${DATABASE_URL:-}
      SQLITE_DATABASE_PATH: ${SQLITE_DATABASE_PATH:-/data/caller-controller.sqlite}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-8081}:8081"
    volumes:
      - caller-data:/data

volumes:
  caller-data:
