name: CI

on:
  push:
  pull_request:

jobs:
  platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run test:service:packages
      - run: npm run test:deploy:config
      - run: npm run test:release:docs
