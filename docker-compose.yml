name: croc-tavern-mvp

services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        APP_PATH: apps/transport-relay
    environment:
      PORT: 8090
      SERVICE_NAME: transport-relay
      RELAY_SQLITE_PATH: /data/relay.sqlite
    ports:
      - "8090:8090"
    volumes:
      - relay-data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: croc
      POSTGRES_USER: croc
      POSTGRES_PASSWORD: croc
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U croc -d croc"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  platform-api:
    build:
      context: .
      dockerfile: Dockerfile.workspace
      args:
        APP_PATH: apps/platform-api
    environment:
      PORT: 8080
      SERVICE_NAME: platform-api
      DATABASE_URL: postgresql://croc:croc@postgres:5432/croc
      BOOTSTRAP_RESPONDER_ID: responder_foxlab
      BOOTSTRAP_HOTLINE_ID: foxlab.text.classifier.v1
      BOOTSTRAP_TASK_DELIVERY_ADDRESS: local://relay/responder_foxlab/foxlab.text.classifier.v1
      BOOTSTRAP_RESPONDER_API_KEY: ${BOOTSTRAP_RESPONDER_API_KEY:-}
      BOOTSTRAP_RESPONDER_PUBLIC_KEY_PEM: ${BOOTSTRAP_RESPONDER_PUBLIC_KEY_PEM:-}
      BOOTSTRAP_RESPONDER_PRIVATE_KEY_PEM: ${BOOTSTRAP_RESPONDER_PRIVATE_KEY_PEM:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  caller-controller:
    image: ${IMAGE_REGISTRY:-ghcr.io/hejiajiudeeyu}/rsp-caller:${IMAGE_TAG:-latest}
    environment:
      PORT: 8081
      SERVICE_NAME: caller-controller
      DATABASE_URL: postgresql://croc:croc@postgres:5432/croc
      PLATFORM_API_BASE_URL: http://platform-api:8080
      TRANSPORT_BASE_URL: http://relay:8090
      TRANSPORT_RECEIVER: caller-controller
      TIMEOUT_CONFIRMATION_MODE: ask_by_default
      HARD_TIMEOUT_AUTO_FINALIZE: "true"
      CALLER_CONTROLLER_POLL_INTERVAL_ACTIVE_S: "5"
      CALLER_CONTROLLER_POLL_INTERVAL_BACKOFF_S: "15"
      CALLER_CONTROLLER_INBOX_POLL_INTERVAL_MS: "250"
      CALLER_CONTROLLER_EVENTS_SYNC_INTERVAL_MS: "250"
    ports:
      - "8081:8081"
    depends_on:
      relay:
        condition: service_started
      platform-api:
        condition: service_started

  responder-controller:
    image: ${IMAGE_REGISTRY:-ghcr.io/hejiajiudeeyu}/rsp-responder:${IMAGE_TAG:-latest}
    environment:
      PORT: 8082
      SERVICE_NAME: responder-controller
      DATABASE_URL: postgresql://croc:croc@postgres:5432/croc
      PLATFORM_API_BASE_URL: http://platform-api:8080
      TRANSPORT_BASE_URL: http://relay:8090
      TRANSPORT_RECEIVER: responder_foxlab
      PLATFORM_API_KEY: ${BOOTSTRAP_RESPONDER_API_KEY:-}
      RESPONDER_ID: responder_foxlab
      HOTLINE_IDS: foxlab.text.classifier.v1
      RESPONDER_SIGNING_PUBLIC_KEY_PEM: ${BOOTSTRAP_RESPONDER_PUBLIC_KEY_PEM:-}
      RESPONDER_SIGNING_PRIVATE_KEY_PEM: ${BOOTSTRAP_RESPONDER_PRIVATE_KEY_PEM:-}
      RESPONDER_INBOX_POLL_INTERVAL_MS: "250"
    ports:
      - "8082:8082"
    depends_on:
      relay:
        condition: service_started
      platform-api:
        condition: service_started

volumes:
  postgres-data:
  relay-data:
